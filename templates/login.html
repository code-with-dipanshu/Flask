<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h1>Login User</h1>

    <form id="loginForm">

        <input
            type="text"
            id="username"
            placeholder="Enter Username"
        >

        <br><br>

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <script>

        document
        .getElementById("loginForm")
        .addEventListener("submit", async function(e){

            e.preventDefault();

            const username =
                document.getElementById("username").value;

            const password =
                document.getElementById("password").value;

            const response = await fetch("/login", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    username: username,
                    password: password
                })

            });

            const data = await response.json();

            alert(JSON.stringify(data));

        });

    </script>

</body>
</html>
